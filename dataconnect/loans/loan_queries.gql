# Loan Queries - Read operations for Loans

query listLoans(
  $limit: Int = 100
  $offset: Int = 0
) @auth(level: PUBLIC) {
  loans(limit: $limit, offset: $offset, orderBy: { loanDate: DESC }) {
    id
    lenderName
    borrowerName
    totalAmount
    paid
    remaining
    loanDate
    dueDate
    type
    category
    status
    notes
    bankId
    bankName
    employeeId
    employeeName
    createdAt
    updatedAt
  }
}

query getLoanById($id: String!) @auth(level: PUBLIC) {
  loan(id: $id) {
    id
    lenderName
    borrowerName
    totalAmount
    paid
    remaining
    loanDate
    dueDate
    type
    category
    status
    notes
    bankId
    bankName
    employeeId
    employeeName
    createdAt
    updatedAt
  }
}

query listLoanPayments(
  $limit: Int = 100
  $offset: Int = 0
) @auth(level: PUBLIC) {
  loanPayments(limit: $limit, offset: $offset, orderBy: { date: DESC }) {
    id
    loanId
    amount
    mode
    date
    bankId
    bankName
    notes
    createdAt
  }
}

query getLoanPaymentById($id: String!) @auth(level: PUBLIC) {
  loanPayment(id: $id) {
    id
    loanId
    amount
    mode
    date
    bankId
    bankName
    notes
    createdAt
  }
}
