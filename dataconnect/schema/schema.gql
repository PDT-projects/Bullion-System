# Firebase Data Connect Schema for ERP System

# ==================== Employee Module ====================
type Employee @table {
  id: String!
  name: String!
  position: String!
  salary: Float!
  phone: String!
  email: String!
  joinDate: String!
  status: String!
  location: String!
  accountNumber: String
  bankName: String
  accountTitle: String
  createdAt: String
  updatedAt: String
}

# ==================== Banking Module ====================
type Bank @table {
  id: String!
  name: String!
  accountNumber: String!
  balance: Float!
  createdAt: String
  updatedAt: String
}

type BankTransfer @table {
  id: String!
  date: String!
  fromBankId: String!
  fromBankName: String!
  toBankId: String!
  toBankName: String!
  amount: Float!
  note: String
  createdAt: String
}

type CashInHand @table {
  id: String!
  date: String!
  company: String!
  mainCategory: String!
  subCategory: String!
  amount: Float!
  mode: String!
  note: String
  createdAt: String
}

# ==================== Loans Module ====================

type Loan @table {
  id: String!
  
  # Requirement: Payable (lender_name) & Receivable (borrower_name)
  # We use generic names here or specific ones; lender/borrower logic 
  # is determined by the 'type' field.
  lenderName: String      # Required for Payable
  borrowerName: String    # Required for Receivable
  
  # Core Fields
  loanDate: String!
  dueDate: String         # due_date for Payable / expected_return_date for Receivable
  totalAmount: Float!
  paid: Float!            # Current total paid/returned
  remaining: Float!       # totalAmount - paid
  
  # Metadata & Status
  type: String!           # "Payable" | "Receivable"
  category: String!       # "Official" | "Personal" | "Other"
  status: String!         # "Full" | "Partial" | "Pending"
  notes: String
  
  # References for "All Loans" view
  bankId: String          # Link to Bank table if disbursed via bank
  bankName: String
  employeeId: String      # Link to Employee if the loan is internal
  employeeName: String
  
  createdAt: String
  updatedAt: String
}

type LoanPayment @table {
  id: String!
  loanId: String!         # Foreign key to main Loan table
  amount: Float!
  mode: String!           # "Cash" | "Bank Transfer"
  date: String!
  bankId: String          # If mode is Bank
  bankName: String
  notes: String
  createdAt: String
}

# ==================== Budget Module ====================

type Budget @table {
  id: String!
  category: String!       # "Expenses"
  subCategory: String!
  period: String!        # "Monthly" | "Quarterly" | "Yearly"
  budgetLimit: Float!
  spent: Float!
  createdAt: String
  updatedAt: String
}

# ==================== Inventory Module ====================

# Costing table - stores costing batches for multi-model products
type Costing @table {
  id: String!
  brandName: String!
  
  # Global inputs for multi-model costing
  usdRate: Float!
  totalCustomsValue: Float!
  totalFreightValue: Float!
  
  # Calculated summary
  totalUnitCostUSD: Float!
  shipmentTotalUSD: Float!
  consignmentValue: Float!
  totalValueOfBrand: Float!
  
  # Models JSON - stores array of CostingModel
  modelsJson: String!
  
  status: String!  # "draft" | "used" | "completed"
  createdAt: String
  updatedAt: String
}

# Brand table - stores brand information
type Brand @table {
  id: String!
  name: String!
  category: String
  description: String
  createdAt: String
  updatedAt: String
}

# Model table - stores model information, linked to Brand
type Model @table {
  id: String!
  brandId: String!  # Foreign key to Brand
  name: String!
  category: String
  description: String
  costPrice: Float      # Cost price for this model
  sellPrice: Float      # Sell price for this model - fetched when model is selected
  createdAt: String
  updatedAt: String
}

type Product @table {
  id: String!
  brandName: String!
  modelName: String!
  category: String!
  costPrice: Float!
  sellPrice: Float!
  buyType: String!
  warrantyYears: Int!
  stock: Int!
  description: String
  status: String!
  isDamaged: Boolean
  serialNumbers: String
  serialCities: String
  serialStatus: String
  
  # New optional fields for brand/model/costing linking
  # These are OPTIONAL for backward compatibility with existing products
  brandId: String      # Optional link to Brand table
  modelId: String      # Optional link to Model table
  costingId: String    # Optional link to costing (for multi-model costing)
  
  # Existing costing fields (flattened in Product for backward compatibility)
  costingOption: String
  costingUnits: Float
  costingUnitCostUSD: Float
  costingTotalCostUSD: Float
  costingPercentage: Float
  costingCustomPerModel: Float
  costingCustomPerUnit: Float
  costingFreightPerModel: Float
  costingFreightPerUnit: Float
  costingUnitCostPKR: Float
  costingTotalUnitCost: Float
  costingTotalShipmentValuePKR: Float
  costingUsdRate: Float
  costingTotalCustomsValue: Float
  costingTotalFreightValue: Float
  costingShipmentTotalUSD: Float
  costingConsignmentValue: Float
  costingTotalValueOfBrand: Float
  costingModelsJson: String
  createdAt: String
  updatedAt: String
}

type ProductTransfer @table {
  id: String!
  productId: String!
  productName: String!
  brandName: String
  modelName: String
  fromLocation: String!
  toLocation: String!
  quantity: Int!
  serialNumbers: String
  date: String!
  transferDate: String
  status: String!
  transferredBy: String
  note: String
  notes: String
  receiptName: String
  receiptType: String
  receiptDataUrl: String
  createdAt: String
  receivedAt: String
}

