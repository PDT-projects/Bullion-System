type User @table {
  displayName: String!
  email: String!
  createdAt: Timestamp!
  photoUrl: String
  role: String
}

type Account @table {
  name: String!
  accountType: String!
  balance: Float!
  createdAt: Timestamp!
  accountNumber: String
  bankName: String
  user: User!
}

type Category @table {
  name: String!
  type: String!
  createdAt: Timestamp!
  description: String
  user: User!
}

type Project @table {
  name: String!
  createdAt: Timestamp!
  description: String
  startDate: Date
  endDate: Date
  user: User!
}

type Transaction @table {
  description: String!
  amount: Float!
  type: String!
  transactionDate: Date!
  createdAt: Timestamp!
  notes: String
  user: User!
  account: Account!
  category: Category!
  project: Project
}

type Budget @table {
  name: String!
  budgetedAmount: Float!
  period: String!
  startDate: Date!
  createdAt: Timestamp!
  description: String
  endDate: Date
  user: User!
  category: Category
  project: Project
}