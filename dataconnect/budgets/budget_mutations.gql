# Budget Mutations - Write operations for Budget

mutation budgetInsert(
  $id: String!,
  $category: String!,
  $subCategory: String!,
  $period: String!,
  $budgetLimit: Float!,
  $spent: Float!
) @auth(level: PUBLIC) {
  budget_insert(
    data: {
      id: $id,
      category: $category,
      subCategory: $subCategory,
      period: $period,
      budgetLimit: $budgetLimit,
      spent: $spent,
      createdAt: "now()",
      updatedAt: "now()"
    }
  )
}

mutation budgetUpdate(
  $id: String!,
  $category: String!,
  $subCategory: String!,
  $period: String!,
  $budgetLimit: Float!,
  $spent: Float!
) @auth(level: PUBLIC) {
  budget_update(
    id: $id,
    data: {
      category: $category,
      subCategory: $subCategory,
      period: $period,
      budgetLimit: $budgetLimit,
      spent: $spent,
      updatedAt: "now()"
    }
  )
}

mutation budgetDelete($id: String!) @auth(level: PUBLIC) {
  budget_delete(id: $id)
}

# Update budget spent amount (for tracking expenses)
mutation budgetUpdateSpent($id: String!, $spent: Float!) @auth(level: PUBLIC) {
  budget_update(
    id: $id,
    data: {
      spent: $spent,
      updatedAt: "now()"
    }
  )
}
