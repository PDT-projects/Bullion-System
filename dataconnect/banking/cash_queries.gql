# Cash In Hand Queries - Read operations for Cash In Hand

query listCashInHand(
  $limit: Int = 10
  $offset: Int = 0
) @auth(level: PUBLIC) {
  cashInHands(limit: $limit, offset: $offset, orderBy: { date: DESC }) {
    id
    date
    company
    mainCategory
    subCategory
    amount
    mode
    note
    createdAt
  }
}

query getCashInHandById($id: String!) @auth(level: PUBLIC) {
  cashInHand(id: $id) {
    id
    date
    company
    mainCategory
    subCategory
    amount
    mode
    note
    createdAt
  }
}
