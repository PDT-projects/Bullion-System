# Bank Transfer Mutations - Write operations for Bank Transfers

mutation transferInsert(
  $id: String! = "transfer001"
  $date: String! = "2024-01-01"
  $fromBankId: String! = "bank001"
  $fromBankName: String! = "Bank A"
  $toBankId: String! = "bank002"
  $toBankName: String! = "Bank B"
  $amount: Float! = 1000.0
  $note: String = "Test transfer"
) @auth(level: PUBLIC) {
  bankTransfer_insert(
    data: {
      id: $id
      date: $date
      fromBankId: $fromBankId
      fromBankName: $fromBankName
      toBankId: $toBankId
      toBankName: $toBankName
      amount: $amount
      note: $note
      createdAt: "now()"
    }
  )
}

mutation transferDelete($id: String! = "transfer001") @auth(level: PUBLIC) {
  bankTransfer_delete(id: $id)
}
