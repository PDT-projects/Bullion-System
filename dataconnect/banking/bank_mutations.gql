# Bank Mutations - Write operations for Bank accounts

mutation BankInsert(
  $id: String!
  $name: String!
  $accountNumber: String!
  $balance: Float!
) @auth(level: PUBLIC) {
  bank_insert(
    data: {
      id: $id
      name: $name
      accountNumber: $accountNumber
      balance: $balance
      createdAt: "now()"
      updatedAt: "now()"
    }
  )
}

mutation BankUpdate(
  $id: String!
  $name: String!
  $accountNumber: String!
  $balance: Float!
) @auth(level: PUBLIC) {
  bank_update(
    id: $id,
    data: {
      name: $name
      accountNumber: $accountNumber
      balance: $balance
      updatedAt: "now()"
    }
  )
}

mutation BankDelete($id: String!) @auth(level: PUBLIC) {
  bank_delete(id: $id)
}

mutation UpdateBankBalance(
  $id: String!
  $newBalance: Float!
) @auth(level: PUBLIC) {
  bank_update(
    id: $id,
    data: {
      balance: $newBalance
      updatedAt: "now()"
    }
  )
}
