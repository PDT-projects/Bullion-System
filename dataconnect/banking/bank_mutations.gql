# Bank Mutations - Write operations for Bank accounts

mutation bankInsert(
  $id: String! = "bank001"
  $name: String! = "Test Bank"
  $accountNumber: String! = "1234567890"
  $balance: Float! = 0.0
) @auth(level: PUBLIC) {
  bank_insert(
    data: {
      id: $id
      name: $name
      accountNumber: $accountNumber
      balance: $balance
      createdAt: "now()"
      updatedAt: "now()"
    }
  )
}

mutation bankUpdate(
  $id: String! = "bank001"
  $name: String! = "Test Bank"
  $accountNumber: String! = "1234567890"
  $balance: Float! = 1000.0
) @auth(level: PUBLIC) {
  bank_update(
    id: $id,
    data: {
      name: $name
      accountNumber: $accountNumber
      balance: $balance
      updatedAt: "now()"
    }
  )
}

mutation bankDelete($id: String! = "bank001") @auth(level: PUBLIC) {
  bank_delete(id: $id)
}

mutation updateBankBalance(
  $id: String! = "bank001"
  $newBalance: Float! = 1000.0
) @auth(level: PUBLIC) {
  bank_update(
    id: $id,
    data: {
      balance: $newBalance
      updatedAt: "now()"
    }
  )
}
