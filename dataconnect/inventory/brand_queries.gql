# Brand Queries - Read operations for Brands

query ListBrands(
  $limit: Int = 100
  $offset: Int = 0
) @auth(level: PUBLIC) {
  brands(limit: $limit, offset: $offset, orderBy: { name: ASC }) {
    id
    name
    category
    description
    createdAt
    updatedAt
  }
}

query GetBrandById($id: String!) @auth(level: PUBLIC) {
  brand(id: $id) {
    id
    name
    category
    description
    createdAt
    updatedAt
  }
}

