# Model Mutations - Write operations for Models

mutation modelInsert(
  $id: String!,
  $brandId: String!,
  $name: String!,
  $category: String,
  $description: String,
  $costPrice: Float,
  $sellPrice: Float
) @auth(level: PUBLIC) {
  model_insert(
    data: {
      id: $id
      brandId: $brandId
      name: $name
      category: $category
      description: $description
      costPrice: $costPrice
      sellPrice: $sellPrice
      createdAt: "now()"
      updatedAt: "now()"
    }
  )
}

mutation modelUpdate(
  $id: String!,
  $brandId: String!,
  $name: String!,
  $category: String,
  $description: String,
  $costPrice: Float,
  $sellPrice: Float
) @auth(level: PUBLIC) {
  model_update(
    id: $id,
    data: {
      brandId: $brandId
      name: $name
      category: $category
      description: $description
      costPrice: $costPrice
      sellPrice: $sellPrice
      updatedAt: "now()"
    }
  )
}

mutation modelDelete($id: String!) @auth(level: PUBLIC) {
  model_delete(id: $id)
}

