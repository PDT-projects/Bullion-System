# Inventory Queries - Read operations for Products and Product Transfers

query ListProducts(
  $limit: Int = 50
  $offset: Int = 0
) @auth(level: PUBLIC) {
  products(limit: $limit, offset: $offset, orderBy: { createdAt: DESC }) {
    id
    brandName
    modelName
    category
    costPrice
    sellPrice
    buyType
    warrantyYears
    stock
    description
    status
    isDamaged
    serialNumbers
    serialCities
    serialStatus
    # New linking fields
    brandId
    modelId
    costingId
    costingOption
    costingUnits
    costingUnitCostUSD
    costingTotalCostUSD
    costingPercentage
    costingCustomPerModel
    costingCustomPerUnit
    costingFreightPerModel
    costingFreightPerUnit
    costingUnitCostPKR
    costingTotalUnitCost
    costingTotalShipmentValuePKR
    costingUsdRate
    costingTotalCustomsValue
    costingTotalFreightValue
    costingShipmentTotalUSD
    costingConsignmentValue
    costingTotalValueOfBrand
    costingModelsJson
    createdAt
    updatedAt
  }
}

query GetProductById($id: String!) @auth(level: PUBLIC) {
  product(id: $id) {
    id
    brandName
    modelName
    category
    costPrice
    sellPrice
    buyType
    warrantyYears
    stock
    description
    status
    isDamaged
    serialNumbers
    serialCities
    serialStatus
    # New linking fields
    brandId
    modelId
    costingId
    costingOption
    costingUnits
    costingUnitCostUSD
    costingTotalCostUSD
    costingPercentage
    costingCustomPerModel
    costingCustomPerUnit
    costingFreightPerModel
    costingFreightPerUnit
    costingUnitCostPKR
    costingTotalUnitCost
    costingTotalShipmentValuePKR
    costingUsdRate
    costingTotalCustomsValue
    costingTotalFreightValue
    costingShipmentTotalUSD
    costingConsignmentValue
    costingTotalValueOfBrand
    costingModelsJson
    createdAt
    updatedAt
  }
}

query ListProductTransfers(
  $limit: Int = 50
  $offset: Int = 0
) @auth(level: PUBLIC) {
  productTransfers(limit: $limit, offset: $offset, orderBy: { date: DESC }) {
    id
    productId
    productName
    brandName
    modelName
    fromLocation
    toLocation
    quantity
    serialNumbers
    date
    transferDate
    status
    transferredBy
    note
    notes
    receiptName
    receiptType
    receiptDataUrl
    createdAt
    receivedAt
  }
}

query GetProductTransferById($id: String!) @auth(level: PUBLIC) {
  productTransfer(id: $id) {
    id
    productId
    productName
    brandName
    modelName
    fromLocation
    toLocation
    quantity
    serialNumbers
    date
    transferDate
    status
    transferredBy
    note
    notes
    receiptName
    receiptType
    receiptDataUrl
    createdAt
    receivedAt
  }
}
