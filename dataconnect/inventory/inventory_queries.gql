# Inventory Queries - Read operations for Products

query ListProducts(
  $limit: Int = 100
  $offset: Int = 0
) @auth(level: PUBLIC) {
  products(limit: $limit, offset: $offset, orderBy: { createdAt: DESC }) {
    id
    brandName
    modelName
    category
    costPrice
    sellPrice
    buyType
    warrantyYears
    stock
    description
    status
    isDamaged
    serialNumbers
    serialCities
    serialStatus
    brandId
    modelId
    costingId
    costingOption
    # Flat costing fields for backward compatibility
    costingUnits
    costingUnitCostUSD
    costingTotalCostUSD
    costingPercentage
    costingCustomPerModel
    costingCustomPerUnit
    costingFreightPerModel
    costingFreightPerUnit
    costingUnitCostPKR
    costingTotalUnitCost
    costingTotalShipmentValuePKR
    costingUsdRate
    costingTotalCustomsValue
    costingTotalFreightValue
    costingShipmentTotalUSD
    costingConsignmentValue
    costingTotalValueOfBrand
    costingModelsJson
    createdAt
    updatedAt
  }
}

query GetProductById($id: String!) @auth(level: PUBLIC) {
  product(id: $id) {
    id
    brandName
    modelName
    category
    costPrice
    sellPrice
    buyType
    warrantyYears
    stock
    description
    status
    isDamaged
    serialNumbers
    serialCities
    serialStatus
    brandId
    modelId
    costingId
    costingOption
    # Flat costing fields for backward compatibility
    costingUnits
    costingUnitCostUSD
    costingTotalCostUSD
    costingPercentage
    costingCustomPerModel
    costingCustomPerUnit
    costingFreightPerModel
    costingFreightPerUnit
    costingUnitCostPKR
    costingTotalUnitCost
    costingTotalShipmentValuePKR
    costingUsdRate
    costingTotalCustomsValue
    costingTotalFreightValue
    costingShipmentTotalUSD
    costingConsignmentValue
    costingTotalValueOfBrand
    costingModelsJson
    createdAt
    updatedAt
  }
}
