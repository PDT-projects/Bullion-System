# Inventory Queries - Read operations for Products and Receivables

query ListProducts(
  $limit: Int = 100
  $offset: Int = 0
) @auth(level: PUBLIC) {
  products(limit: $limit, offset: $offset, orderBy: { createdAt: DESC }) {
    id
    brandName
    modelName
    category
    costPrice
    sellPrice
    buyType
    warrantyYears
    stock
    description
    status
    isDamaged
    serialNumbers
    serialCities
    serialStatus
    brandId
    modelId
    costingId
    costingOption
    # Receivable fields - commented (not in Product schema)
    # billId
    # receivableStatus
    # expectedReceiveDate
    # Flat costing fields for backward compatibility
    costingUnits
    costingUnitCostUSD
    costingTotalCostUSD
    costingPercentage
    costingCustomPerModel
    costingCustomPerUnit
    costingFreightPerModel
    costingFreightPerUnit
    costingUnitCostPKR
    costingTotalUnitCost
    costingTotalShipmentValuePKR
    costingUsdRate
    costingTotalCustomsValue
    costingTotalFreightValue
    costingShipmentTotalUSD
    costingConsignmentValue
    costingTotalValueOfBrand
    costingModelsJson
    createdAt
    updatedAt
  }
}

query ListReceivableProducts(
  $limit: Int = 100
  $offset: Int = 0
  $status: String = "Pending"
) @auth(level: PUBLIC) {
  products(
    where: {
      # receivableStatus: { eq: $status }  # commented - no field in Product_Filter
      _or: [
        { status: { eq: "On-Order" } }
        { status: { eq: "Receivable" } }
      ]
    }
    limit: $limit
    offset: $offset
    # orderBy: { expectedReceiveDate: ASC } # Commented out - field not in Product
  ) {
    id
    brandName
    modelName
    category
    costPrice
    sellPrice
    stock
    status
    serialNumbers
    createdAt
  }
}

