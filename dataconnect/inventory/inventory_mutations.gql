# Inventory Mutations - Write operations for Products and Product Transfers

mutation productInsert(
  $id: String!,
  $brandName: String!,
  $modelName: String!,
  $category: String!,
  $costPrice: Float!,
  $sellPrice: Float!,
  $buyType: String!,
  $warrantyYears: Int!,
  $stock: Int!,
  $description: String,
  $status: String!,
  $isDamaged: Boolean,
  $serialNumbers: String,
  $serialCities: String,
  $serialStatus: String,
  $costingOption: String,
  $costingUnits: Float,
  $costingUnitCostUSD: Float,
  $costingTotalCostUSD: Float,
  $costingPercentage: Float,
  $costingCustomPerModel: Float,
  $costingCustomPerUnit: Float,
  $costingFreightPerModel: Float,
  $costingFreightPerUnit: Float,
  $costingUnitCostPKR: Float,
  $costingTotalUnitCost: Float,
  $costingTotalShipmentValuePKR: Float
) @auth(level: PUBLIC) {
  product_insert(
    data: {
      id: $id
      brandName: $brandName
      modelName: $modelName
      category: $category
      costPrice: $costPrice
      sellPrice: $sellPrice
      buyType: $buyType
      warrantyYears: $warrantyYears
      stock: $stock
      description: $description
      status: $status
      isDamaged: $isDamaged
      serialNumbers: $serialNumbers
      serialCities: $serialCities
      serialStatus: $serialStatus
      costingOption: $costingOption
      costingUnits: $costingUnits
      costingUnitCostUSD: $costingUnitCostUSD
      costingTotalCostUSD: $costingTotalCostUSD
      costingPercentage: $costingPercentage
      costingCustomPerModel: $costingCustomPerModel
      costingCustomPerUnit: $costingCustomPerUnit
      costingFreightPerModel: $costingFreightPerModel
      costingFreightPerUnit: $costingFreightPerUnit
      costingUnitCostPKR: $costingUnitCostPKR
      costingTotalUnitCost: $costingTotalUnitCost
      costingTotalShipmentValuePKR: $costingTotalShipmentValuePKR
      createdAt: "now()"
      updatedAt: "now()"
    }
  )
}

mutation productUpdate(
  $id: String!,
  $brandName: String!,
  $modelName: String!,
  $category: String!,
  $costPrice: Float!,
  $sellPrice: Float!,
  $buyType: String!,
  $warrantyYears: Int!,
  $stock: Int!,
  $description: String,
  $status: String!,
  $isDamaged: Boolean,
  $serialNumbers: String,
  $serialCities: String,
  $serialStatus: String,
  $costingOption: String,
  $costingUnits: Float,
  $costingUnitCostUSD: Float,
  $costingTotalCostUSD: Float,
  $costingPercentage: Float,
  $costingCustomPerModel: Float,
  $costingCustomPerUnit: Float,
  $costingFreightPerModel: Float,
  $costingFreightPerUnit: Float,
  $costingUnitCostPKR: Float,
  $costingTotalUnitCost: Float,
  $costingTotalShipmentValuePKR: Float
) @auth(level: PUBLIC) {
  product_update(
    id: $id,
    data: {
      brandName: $brandName
      modelName: $modelName
      category: $category
      costPrice: $costPrice
      sellPrice: $sellPrice
      buyType: $buyType
      warrantyYears: $warrantyYears
      stock: $stock
      description: $description
      status: $status
      isDamaged: $isDamaged
      serialNumbers: $serialNumbers
      serialCities: $serialCities
      serialStatus: $serialStatus
      costingOption: $costingOption
      costingUnits: $costingUnits
      costingUnitCostUSD: $costingUnitCostUSD
      costingTotalCostUSD: $costingTotalCostUSD
      costingPercentage: $costingPercentage
      costingCustomPerModel: $costingCustomPerModel
      costingCustomPerUnit: $costingCustomPerUnit
      costingFreightPerModel: $costingFreightPerModel
      costingFreightPerUnit: $costingFreightPerUnit
      costingUnitCostPKR: $costingUnitCostPKR
      costingTotalUnitCost: $costingTotalUnitCost
      costingTotalShipmentValuePKR: $costingTotalShipmentValuePKR
      updatedAt: "now()"
    }
  )
}

mutation productDelete($id: String!) @auth(level: PUBLIC) {
  product_delete(id: $id)
}

mutation productTransferInsert(
  $id: String!,
  $productId: String!,
  $productName: String!,
  $brandName: String,
  $modelName: String,
  $fromLocation: String!,
  $toLocation: String!,
  $quantity: Int!,
  $serialNumbers: String,
  $date: String!,
  $transferDate: String,
  $status: String!,
  $transferredBy: String,
  $note: String,
  $notes: String,
  $receiptName: String,
  $receiptType: String,
  $receiptDataUrl: String
) @auth(level: PUBLIC) {
  productTransfer_insert(
    data: {
      id: $id
      productId: $productId
      productName: $productName
      brandName: $brandName
      modelName: $modelName
      fromLocation: $fromLocation
      toLocation: $toLocation
      quantity: $quantity
      serialNumbers: $serialNumbers
      date: $date
      transferDate: $transferDate
      status: $status
      transferredBy: $transferredBy
      note: $note
      notes: $notes
      receiptName: $receiptName
      receiptType: $receiptType
      receiptDataUrl: $receiptDataUrl
      createdAt: "now()"
      receivedAt: "now()"
    }
  )
}

mutation productTransferUpdate(
  $id: String!,
  $productId: String!,
  $productName: String!,
  $brandName: String,
  $modelName: String,
  $fromLocation: String!,
  $toLocation: String!,
  $quantity: Int!,
  $serialNumbers: String,
  $date: String!,
  $transferDate: String,
  $status: String!,
  $transferredBy: String,
  $note: String,
  $notes: String,
  $receiptName: String,
  $receiptType: String,
  $receiptDataUrl: String
) @auth(level: PUBLIC) {
  productTransfer_update(
    id: $id,
    data: {
      productId: $productId
      productName: $productName
      brandName: $brandName
      modelName: $modelName
      fromLocation: $fromLocation
      toLocation: $toLocation
      quantity: $quantity
      serialNumbers: $serialNumbers
      date: $date
      transferDate: $transferDate
      status: $status
      transferredBy: $transferredBy
      note: $note
      notes: $notes
      receiptName: $receiptName
      receiptType: $receiptType
      receiptDataUrl: $receiptDataUrl
      receivedAt: "now()"
    }
  )
}

mutation productTransferDelete($id: String!) @auth(level: PUBLIC) {
  productTransfer_delete(id: $id)
}
