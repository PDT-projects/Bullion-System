mutation productTransferInsert(
  $id: String!,
  $productId: String!,
  $productName: String!,
  $brandName: String,
  $modelName: String,
  $fromLocation: String!,
  $toLocation: String!,
  $quantity: Int!,
  $serialNumbers: String,
  $date: String!,
  $transferDate: String,
  $status: String!,
  $transferredBy: String,
  $note: String,
  $notes: String,
  $receiptName: String,
  $receiptType: String,
  $receiptDataUrl: String
) @auth(level: PUBLIC) {
  productTransfer_insert(
    data: {
      id: $id
      productId: $productId
      productName: $productName
      brandName: $brandName
      modelName: $modelName
      fromLocation: $fromLocation
      toLocation: $toLocation
      quantity: $quantity
      serialNumbers: $serialNumbers
      date: $date
      transferDate: $transferDate
      status: $status
      transferredBy: $transferredBy
      note: $note
      notes: $notes
      receiptName: $receiptName
      receiptType: $receiptType
      receiptDataUrl: $receiptDataUrl
      createdAt: "now()"
      receivedAt: "now()"
    }
  )
}

