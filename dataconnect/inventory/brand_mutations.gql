# Brand Mutations - Write operations for Brands

mutation brandInsert(
  $id: String!,
  $name: String!,
  $category: String,
  $description: String
) @auth(level: PUBLIC) {
  brand_insert(
    data: {
      id: $id
      name: $name
      category: $category
      description: $description
      createdAt: "now()"
      updatedAt: "now()"
    }
  )
}

mutation brandUpdate(
  $id: String!,
  $name: String!,
  $category: String,
  $description: String
) @auth(level: PUBLIC) {
  brand_update(
    id: $id,
    data: {
      name: $name
      category: $category
      description: $description
      updatedAt: "now()"
    }
  )
}

mutation brandDelete($id: String!) @auth(level: PUBLIC) {
  brand_delete(id: $id)
}

